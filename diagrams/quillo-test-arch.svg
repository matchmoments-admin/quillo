<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 -90 1386 1885.75" width="1386" height="1885.75" font-family="Helvetica,Arial,sans-serif">
<rect x="10" y="-90" width="1386" height="1885.75" fill="#ffffff"/>
<defs><marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#868e96"/></marker></defs>
<text x="40" y="-34" font-size="26" fill="#212529" font-weight="bold">Quillo — architecture + testing plan (per process)</text>
<text x="40" y="-9" font-size="13" fill="#868e96" font-weight="normal">Live app: app.quillo.au   ·   Public site: quillo.au   ·   Worker: tax-agent.matchmoments.workers.dev   ·   Full guidance: diagrams/TESTING.md</text>
<text x="40" y="44" font-size="14" fill="#495057" font-weight="bold">ARCHITECTURE — money flows through ONE pipe per account (no double-count)</text>
<rect x="40" y="60" width="150" height="64" rx="8" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
<text x="50" y="84" font-size="12" fill="#212529" font-weight="normal">Capture</text>
<text x="50" y="99" font-size="12" fill="#212529" font-weight="normal">photo · email · CSV/PDF · QBO</text>
<line x1="190" y1="92" x2="208" y2="92" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<rect x="208" y="60" width="150" height="64" rx="8" fill="#fff9db" stroke="#e8590c" stroke-width="2"/>
<text x="218" y="84" font-size="12" fill="#212529" font-weight="normal">Clerk auth</text>
<text x="218" y="99" font-size="12" fill="#212529" font-weight="normal">single-user lockdown</text>
<line x1="358" y1="92" x2="376" y2="92" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<rect x="376" y="60" width="150" height="64" rx="8" fill="#fff9db" stroke="#e8590c" stroke-width="2"/>
<text x="386" y="84" font-size="12" fill="#212529" font-weight="normal">Ingest → R2</text>
<text x="386" y="99" font-size="12" fill="#212529" font-weight="normal">store raw</text>
<line x1="526" y1="92" x2="544" y2="92" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<rect x="544" y="60" width="150" height="64" rx="8" fill="#fff9db" stroke="#e8590c" stroke-width="2"/>
<text x="554" y="84" font-size="12" fill="#212529" font-weight="normal">Extract (Claude)</text>
<text x="554" y="99" font-size="12" fill="#212529" font-weight="normal">merchant·amt·GST·fx</text>
<line x1="694" y1="92" x2="712" y2="92" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<rect x="712" y="60" width="150" height="64" rx="8" fill="#fff9db" stroke="#e8590c" stroke-width="2"/>
<text x="722" y="84" font-size="12" fill="#212529" font-weight="normal">Categorise</text>
<text x="722" y="99" font-size="12" fill="#212529" font-weight="normal">rules(KV)+Claude</text>
<line x1="862" y1="92" x2="880" y2="92" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<rect x="880" y="60" width="150" height="64" rx="8" fill="#fff9db" stroke="#e8590c" stroke-width="2"/>
<text x="890" y="84" font-size="12" fill="#212529" font-weight="normal">Reconcile/Match</text>
<text x="890" y="99" font-size="12" fill="#212529" font-weight="normal">balance + receipt↔line</text>
<line x1="1030" y1="92" x2="1048" y2="92" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<rect x="1048" y="60" width="150" height="64" rx="8" fill="#f3f0ff" stroke="#7048e8" stroke-width="2"/>
<text x="1058" y="84" font-size="12" fill="#212529" font-weight="normal">Store → D1</text>
<text x="1058" y="99" font-size="12" fill="#212529" font-weight="normal">+ audit chain</text>
<rect x="1216" y="60" width="150" height="64" rx="8" fill="#f3f0ff" stroke="#7048e8" stroke-width="2"/>
<text x="1226" y="84" font-size="12" fill="#212529" font-weight="normal">D1 · R2 · KV</text>
<text x="1226" y="99" font-size="12" fill="#212529" font-weight="normal">Review UI + Reports</text>
<text x="40" y="154" font-size="14" fill="#495057" font-weight="bold">TESTING PLAN — one card per process (cards are clickable → open the relevant screen)</text>
<rect x="40" y="170" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="198" font-size="14" fill="#212529" font-weight="bold">Auth — single-user lockdown</text>
<text x="54" y="225" font-size="11" fill="#495057" font-weight="normal">Clerk JWT (jose/JWKS); only CLERK_ALLOWED_USERS reach /api/*. Public apex stays open.</text>
<line x1="340" y1="228.0" x2="380" y2="228.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="221" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="170" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="193" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au</text>
<text x="398" y="218" font-size="12" fill="#212529" font-weight="normal">•  curl -s -o /dev/null -w '%{http_code}' https://tax-agent.matchmoments.workers.dev/api/usage  → 401</text>
<text x="398" y="233" font-size="12" fill="#212529" font-weight="normal">•  Sign in at app.quillo.au with your Clerk user → /api/* works.</text>
<text x="398" y="248" font-size="12" fill="#212529" font-weight="normal">•  Open quillo.au in a private window → public, no auth.</text>
<rect x="40" y="302" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="330" font-size="14" fill="#212529" font-weight="bold">Receipt capture + extract</text>
<text x="54" y="357" font-size="11" fill="#495057" font-weight="normal">Photo → R2 → Claude vision → merchant·amount·GST·date·bucket. Confidence gates auto-file vs review.</text>
<line x1="340" y1="360.0" x2="380" y2="360.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="353" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="302" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="325" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au</text>
<text x="398" y="350" font-size="12" fill="#212529" font-weight="normal">•  On phone: app.quillo.au → '+ Add receipt' → snap. Expect merchant/amount/GST within ~5s.</text>
<text x="398" y="365" font-size="12" fill="#212529" font-weight="normal">•  Bulk/offline: node scripts/feed-expenses.mjs &lt;folder|file&gt;.</text>
<text x="398" y="380" font-size="12" fill="#212529" font-weight="normal">•  Verify in Inbox → tap row → fields + receipt image + confidence.</text>
<rect x="40" y="434" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="462" font-size="14" fill="#212529" font-weight="bold">Edge cases — multi-shot · USD · duplicates</text>
<text x="54" y="489" font-size="11" fill="#495057" font-weight="normal">Multiple screenshots = one receipt; foreign currency → amount_aud_cents via fx; re-upload de-duped.</text>
<line x1="340" y1="492.0" x2="380" y2="492.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="485" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="434" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="457" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au</text>
<text x="398" y="482" font-size="12" fill="#212529" font-weight="normal">•  Share 2-3 screenshots together → one transaction, not three.</text>
<text x="398" y="497" font-size="12" fill="#212529" font-weight="normal">•  Upload a USD receipt (e.g. Anthropic) → currency=USD + AUD amount shown.</text>
<text x="398" y="512" font-size="12" fill="#212529" font-weight="normal">•  Re-upload the same file → marked duplicate, not double-counted.</text>
<rect x="40" y="566" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="594" font-size="14" fill="#212529" font-weight="bold">Categorise + correction learning</text>
<text x="54" y="621" font-size="11" fill="#495057" font-weight="normal">Deterministic rule pack (KV) first, Claude fallback. A correction writes a per-user rule.</text>
<line x1="340" y1="624.0" x2="380" y2="624.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="617" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="566" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="589" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au/settings</text>
<text x="398" y="614" font-size="12" fill="#212529" font-weight="normal">•  Inbox → correct a bucket/ATO label → corrections + audit_log row.</text>
<text x="398" y="629" font-size="12" fill="#212529" font-weight="normal">•  Upload a similar merchant again → now auto-categorised (rule learned).</text>
<text x="398" y="644" font-size="12" fill="#212529" font-weight="normal">•  Settings → Per-user rules: confirm the new rule; edit/delete works.</text>
<rect x="40" y="698" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="726" font-size="14" fill="#212529" font-weight="bold">Statement import + reconciliation</text>
<text x="54" y="753" font-size="11" fill="#495057" font-weight="normal">CSV/PDF → parsed lines → opening+Σsigned==closing proof. ✓ balances or ⚠ off-by-$X w/ first bad line.</text>
<line x1="340" y1="756.0" x2="380" y2="756.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="749" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="698" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="721" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au/accounts</text>
<text x="398" y="746" font-size="12" fill="#212529" font-weight="normal">•  Accounts → add account → 'Upload statement (CSV/PDF)'.</text>
<text x="398" y="761" font-size="12" fill="#212529" font-weight="normal">•  Expect a green ✓ 'Balances' OR a red ⚠ with the exact diff + bad line.</text>
<text x="398" y="776" font-size="12" fill="#212529" font-weight="normal">•  Offline harness: npm run eval:statements (westpac ✓, mismatch ✗).</text>
<rect x="40" y="830" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="858" font-size="14" fill="#212529" font-weight="bold">Receipt ↔ bank-line matching</text>
<text x="54" y="885" font-size="11" fill="#495057" font-weight="normal">Unmatched receipts vs unmatched bank lines; link hides the receipt from counting (no double-count).</text>
<line x1="340" y1="888.0" x2="380" y2="888.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="881" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="830" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="853" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au/reconcile</text>
<text x="398" y="878" font-size="12" fill="#212529" font-weight="normal">•  Reconcile page: pick a receipt + its bank line → Link.</text>
<text x="398" y="893" font-size="12" fill="#212529" font-weight="normal">•  Linked receipt disappears from 'needs review'; Unlink restores it.</text>
<text x="398" y="908" font-size="12" fill="#212529" font-weight="normal">•  Dashboard total unchanged after linking (counted once).</text>
<rect x="40" y="962" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="990" font-size="14" fill="#212529" font-weight="bold">QBO feed sync — no double-count</text>
<text x="54" y="1017" font-size="11" fill="#495057" font-weight="normal">Sync registers QBO bank/card accounts as source=qbo_feed; those refuse statement uploads + are excluded from reconcile.</text>
<line x1="340" y1="1020.0" x2="380" y2="1020.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="1013" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="962" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="985" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au/accounts</text>
<text x="398" y="1010" font-size="12" fill="#212529" font-weight="normal">•  Connect QuickBooks (Settings/QuickBooks), then Accounts → 'Sync accounts from QuickBooks'.</text>
<text x="398" y="1025" font-size="12" fill="#212529" font-weight="normal">•  A qbo_feed account shows no 'Upload statement' button (guard active).</text>
<text x="398" y="1040" font-size="12" fill="#212529" font-weight="normal">•  QuickBooks reconcile lists only receipt expenses, never bank lines.</text>
<rect x="40" y="1094" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="1122" font-size="14" fill="#212529" font-weight="bold">Async batch categorisation + failure handling</text>
<text x="54" y="1149" font-size="11" fill="#495057" font-weight="normal">Large statements (&gt;60 lines) → Message Batches API (50% off). Zombie-proof: all-errored→failed, &gt;24h→failed+notify.</text>
<line x1="340" y1="1152.0" x2="380" y2="1152.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="1145" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="1094" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="1117" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au/accounts</text>
<text x="398" y="1142" font-size="12" fill="#212529" font-weight="normal">•  Import a big statement → account shows 'categorising…', then 'imported (n)'.</text>
<text x="398" y="1157" font-size="12" fill="#212529" font-weight="normal">•  Status polls every 5s while categorising; failure → red 'failed' + alert.</text>
<text x="398" y="1172" font-size="12" fill="#212529" font-weight="normal">•  Unit guard: npm run test:units (batchStatementStatus / isStaleBatch).</text>
<rect x="40" y="1226" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="1254" font-size="14" fill="#212529" font-weight="bold">Cost / budget meter</text>
<text x="54" y="1281" font-size="11" fill="#495057" font-weight="normal">Per-call usage + $ logged; MAX_DAILY_COST_CENTS caps spend; Batch API halves async cost.</text>
<line x1="340" y1="1284.0" x2="380" y2="1284.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="1277" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="1226" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="1249" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au/settings</text>
<text x="398" y="1274" font-size="12" fill="#212529" font-weight="normal">•  GET /api/usage → today/month cents + by-feature breakdown.</text>
<text x="398" y="1289" font-size="12" fill="#212529" font-weight="normal">•  1 receipt ≈ $0.0028; 300-row statement ≈ 2.9¢ (verified).</text>
<text x="398" y="1304" font-size="12" fill="#212529" font-weight="normal">•  Set MAX_DAILY_COST_CENTS low to confirm the cap blocks further calls.</text>
<rect x="40" y="1358" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="1386" font-size="14" fill="#212529" font-weight="bold">Offline regression net</text>
<text x="54" y="1413" font-size="11" fill="#495057" font-weight="normal">No worker/Claude needed — deterministic guards on the invariants we keep re-learning.</text>
<line x1="340" y1="1416.0" x2="380" y2="1416.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="1409" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="1358" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="1381" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://github.com/consulting-brendan</text>
<text x="398" y="1406" font-size="12" fill="#212529" font-weight="normal">•  npm test  → 25 unit assertions + 2 statement cases, exit 0.</text>
<text x="398" y="1421" font-size="12" fill="#212529" font-weight="normal">•  npm run test:units → reconcile, transfer-conservatism, fingerprint, batch.</text>
<text x="398" y="1436" font-size="12" fill="#212529" font-weight="normal">•  npm run eval:statements → line accuracy + reconcile pass-rate.</text>
<rect x="40" y="1490" width="300" height="116" rx="8" fill="#ebfbee" stroke="#2f9e44" stroke-width="2"/>
<text x="54" y="1518" font-size="14" fill="#212529" font-weight="bold">Dashboard + Reports</text>
<text x="54" y="1545" font-size="11" fill="#495057" font-weight="normal">Aggregates by bucket/property; FY report + CSV export for your tax/BAS agent.</text>
<line x1="340" y1="1548.0" x2="380" y2="1548.0" stroke="#868e96" stroke-width="2" marker-end="url(#arw)"/>
<text x="348.0" y="1541" font-size="11" fill="#868e96" font-weight="normal">test</text>
<rect x="384" y="1490" width="780" height="116" rx="8" fill="#ffffff" stroke="#495057" stroke-width="2"/>
<text x="398" y="1513" font-size="11" fill="#1971c2" font-weight="normal">How to test  ·  https://app.quillo.au/reports</text>
<text x="398" y="1538" font-size="12" fill="#212529" font-weight="normal">•  Dashboard → totals by bucket match the ledger.</text>
<text x="398" y="1553" font-size="12" fill="#212529" font-weight="normal">•  Reports → pick FY → company quarters, rental schedule, GST credits.</text>
<text x="398" y="1568" font-size="12" fill="#212529" font-weight="normal">•  Export CSV → hand to your registered agent (Quillo never lodges).</text>
<text x="40" y="1646" font-size="14" fill="#495057" font-weight="bold">BACKGROUND (cron */10 + Mon 08:00)</text>
<rect x="40" y="1660" width="360" height="70" rx="8" fill="#fff0f6" stroke="#c2255c" stroke-width="2"/>
<text x="52" y="1682" font-size="12" fill="#212529" font-weight="normal">Proactive scan</text>
<text x="52" y="1697" font-size="12" fill="#212529" font-weight="normal">vacant-property + uncategorised nudges (COUNTABLE-filtered)</text>
<text x="52" y="1720" font-size="10" fill="#c2255c" font-weight="normal">scan: weekly + on /dashboard</text>
<rect x="420" y="1660" width="360" height="70" rx="8" fill="#fff0f6" stroke="#c2255c" stroke-width="2"/>
<text x="432" y="1682" font-size="12" fill="#212529" font-weight="normal">Batch poll</text>
<text x="432" y="1697" font-size="12" fill="#212529" font-weight="normal">apply finished categorisations; fail zombies &gt;24h</text>
<text x="432" y="1720" font-size="10" fill="#c2255c" font-weight="normal">cron */10 + opportunistic</text>
<rect x="800" y="1660" width="360" height="70" rx="8" fill="#fff0f6" stroke="#c2255c" stroke-width="2"/>
<text x="812" y="1682" font-size="12" fill="#212529" font-weight="normal">Budget meter</text>
<text x="812" y="1697" font-size="12" fill="#212529" font-weight="normal">rolling $ spend in KV; blocks over cap</text>
<text x="812" y="1720" font-size="10" fill="#c2255c" font-weight="normal">every inference call</text>
<text x="40" y="1763" font-size="11" fill="#868e96" font-weight="normal">Note: live click-throughs need your Clerk login (single-user lockdown). Offline gates (npm test) run anywhere. macOS 12.6 can't run workerd locally → deploy is the live test path.</text>
</svg>