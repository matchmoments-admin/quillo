# tax-agent — Self-Improving Tax Agent (separate Worker; see docs/tax-agent-build-plan.md in agent-fleet)
name = "tax-agent"
main = "src/index.ts"
# Aligned to the agent-fleet repo's compatibility_date (review finding cf-arch). nodejs_compat
# gives us Buffer for safe base64 (fixes the String.fromCharCode stack-overflow, finding H2).
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Branded custom domain (zone quillo.au must be active in Cloudflare). wrangler
# provisions the proxied DNS record + TLS cert on deploy. The app is also reachable
# at tax-agent.<account>.workers.dev.
# app.quillo.au = the gated app (Cloudflare Access in front). quillo.au + www = the
# PUBLIC marketing apex (no Access app on these hosts). The Worker branches on Host.
# apex/www use ZONE ROUTES (not custom_domain) because those hostnames already have
# proxied DNS records — custom_domain would try to create DNS and refuses when records
# exist. Zone routes attach the Worker to the existing proxied records instead.
routes = [
  { pattern = "app.quillo.au",   custom_domain = true },
  { pattern = "quillo.au/*",     zone_name = "quillo.au" },
  { pattern = "www.quillo.au/*", zone_name = "quillo.au" },
]
# Keep the *.workers.dev URL as a working fallback (esp. while the custom-domain cert provisions).
workers_dev = true

[limits]
cpu_ms = 300000

# Persist console logs + uncaught exceptions to Workers Logs so a failed upload is queryable
# after the fact (this incident had to be guessed at because nothing was logged).
[observability]
enabled = true

# --- Durable Object: one TaxAgent instance per tenant (keyed by user_id) ---
# Uses the Cloudflare Agents SDK ("agents" package — verified npm name, not @cloudflare/agents).
[[durable_objects.bindings]]
name = "TaxAgent"
class_name = "TaxAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TaxAgent"]

# --- D1: relational system-of-record (tenants, profiles, transactions, corrections, traces, audit) ---
[[d1_databases]]
binding = "DB"
database_name = "tax-agent-db"
database_id = "76e1c20a-efa2-4042-858a-7e24be4c14ce"   # wrangler d1 create tax-agent-db

# --- R2: receipt images / PDFs (5-year ATO retention; do NOT auto-delete inside the window) ---
[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "tax-agent-receipts"

# --- KV: nonce dedup (anti-replay), cached ledger account/tax-code lookups, rule packs ---
[[kv_namespaces]]
binding = "RULES"
id = "037b40a5d83f4982aac49723f34fc407"             # wrangler kv namespace create RULES

# --- Static assets: the web SPA, served from this same Worker (same-origin, no CORS) ---
# Requires wrangler v4.20+. The SPA build lands in web/dist; the Worker runs first for the
# API + device endpoints, assets serve everything else with SPA fallback to index.html.
[assets]
directory = "./web/dist/"
binding = "ASSETS"
not_found_handling = "single-page-application"
# "/" and "/waitlist" are listed so the Worker runs first for the apex marketing page
# and waitlist POST (run_worker_first matches PATH, not host — the in-code Host branch
# decides what each host returns; on the app host "/" is handed back to ASSETS).
run_worker_first = ["/", "/waitlist", "/terms", "/privacy", "/api/*", "/ingest", "/correct", "/consent", "/healthz", "/csp-report", "/agents/*"]

# --- Cron: proactive suggestion engine (weekly Mon 08:00 UTC) ---
[triggers]
# Mon 08:00 UTC: proactive scan. Every 10 min: poll + apply finished async categorisation batches.
crons = ["0 8 * * 1", "*/10 * * * *"]

[vars]
JURISDICTION = "AU"
# Enabled feature flags (comma-separated; see src/lib/features.ts). Each new behaviour ships
# behind a flag so it can be disabled with one edit + redeploy (instant rollback, no data change).
FEATURES = "refund_netting,refund_netting_v2,income_dedupe,asset_defaults,bulk_import,deductibility_review,guide_me,onboarding_checklist,journey_spine,categorise_v2,txn_bulk_edit,claim_review,txn_scan,position_confirmed_range,position_excludes_nondeductible,position_excludes_property_undetermined,accountant_pass,wfh_car_methods,car_methods,wfh_generate_diary,loan_split,attribution_engine,cgt_engine,ess_engine,car_logbook,trust_distributions,apply_to_siblings,loan_interest_v2,gst_bas,smsf_engine,ask_quillo,accountant_schedule,ask_actions,advisory_layer,advisory_partners_energy,franking_gross_up,super_deduction,mf_components,partnership_distributions,jurisdiction_period,currency_base,floating_chat,chat_nav,ai_edit_feed,ask_actions_v2,record_credit_income,phi_extras_tracker,phi_provider_directory,billing,accountant_xlsx,quillo_fee_deduction,grouped_review,txn_inline_edit,clarify_direction_guard,asset_life_default,income_statement_multi,income_statement_upload,noa_capture,attribution_labels,wfh_hours_simple,asset_class_defaults,mobile_bottom_tabs,nav_disclosure,adaptive_dashboard,checklist_v2,guidance_v2,txn_drawer,carryforward_position,integrity_nudges,dep_method_lock,payg_express,cgt_parcel_method,trading_stock,non_cash_income,txn_scan_v2,inline_claim,accountant_schedule_v2,readiness_audit_v2,bulk_confirm,grouped_review_v2,nav_progress_strip,unified_review_groups,bulk_ignore,grouped_deductions,rule_from_action"
# Per-user daily AI-spend budget in cents (measured, credit insurance). 0/unset = unlimited.
# e.g. 500 = $5/day. Replaces the old count cap; over budget → receipts queue as needs_review.
MAX_DAILY_COST_CENTS = "500"
# Platform-wide daily AI-spend ceiling across ALL tenants (the multi-tenant backstop). 0/unset =
# unlimited. e.g. 2500 = $25/day total; over it, new AI work degrades to needs_review for everyone.
MAX_DAILY_COST_CENTS_GLOBAL = "2500"
# Platform-wide MONTHLY AI-spend ceiling — a firm upper bound beyond the daily cap so spend can never
# run away across a month. 0/unset = unlimited. 20000 = $200/month (≈ the AWS credit budget); over it
# AI pauses for everyone until the month rolls over (data is saved for review). Tune as you grow.
MAX_MONTHLY_COST_CENTS_GLOBAL = "20000"
# Ask Quillo chat rate limits (anti-abuse, enforced server-side BEFORE any model call, alongside the
# daily $ budget). 0/unset = no limit. Per-tenant only (the DO serialises a tenant's turns, so the KV
# counter is race-free per tenant). A blocked turn returns 429 (per-minute/day) or 400 (oversize).
CHAT_MAX_TURNS_PER_MIN = "12"     # burst cap: turns per rolling minute per tenant
CHAT_MAX_TURNS_PER_DAY = "300"    # daily turn cap per tenant (defence in depth under the $ budget)
CHAT_MAX_MESSAGE_CHARS = "2000"   # reject oversize prompts before grounding/model work (token-bomb guard)
# Default statement-categorisation path (per-tenant override: profiles.categorise_mode).
#   auto  → size-based: >60 lines go to the async Batch API (~50% cheaper), else synchronous live.
#   live  → always synchronous Claude calls (instant, full price). Huge jobs fall back to batch.
#   batch → always the async Message Batches API (cheapest, applied by the */10 cron).
# Set to live/batch to A/B the UX and compare measured cost in llm_usage. 'auto' = today's behaviour.
CATEGORISE_MODE = "auto"
# AI-cost billing seam (DISPLAY ONLY today — no charging wired up). The "billable" figure shown to a
# tenant = measured AI cost × (1 + COST_MARKUP_PCT/100) + APP_FEE_CENTS. Verify the usage.ts pricing
# table against live Anthropic rates before turning any of this into a real charge.
COST_MARKUP_PCT = "30"
APP_FEE_CENTS = "0"
# Usage-based billing (flag `billing`): one-off free credit allowance granted on first AI use, in cents.
# 500 = $5. Then the user tops up (Stripe) and pays measured AI cost × (1 + COST_MARKUP_PCT/100).
FREE_CREDIT_GRANT_CENTS = "500"
# Clerk auth (replaces Cloudflare Access). CLERK_ISSUER = the Clerk Frontend API URL
# (derived from the publishable key). The Worker verifies session JWTs against
# ${CLERK_ISSUER}/.well-known/jwks.json. Leave CLERK_ISSUER UNSET for local dev (the API
# falls back to the pilot tenant, like the old Access seam).
CLERK_ISSUER = "https://obliging-eel-28.clerk.accounts.dev"
# Allow-list: ONLY these Clerk user ids (comma-separated) may use /api/*. Empty = deny everyone
# (credit-safe). Add a tester's sub here after they sign up (it's logged on their first 403).
CLERK_ALLOWED_USERS = "user_3EX9q24hvBuYNz3Hk6Pg6O5FfBq"
# The founder's Clerk sub → mapped to the pilot tenant "me" (data continuity). Every OTHER
# allow-listed user gets their own isolated tenant keyed by their sub. Unset → everyone maps to "me".
CLERK_FOUNDER_SUB = "user_3EX9q24hvBuYNz3Hk6Pg6O5FfBq"
# Cloudflare Access (web UI auth). Leave UNSET for local dev (API falls back to the pilot
# tenant). For production set these to your Access application's values:
# CF_ACCESS_TEAM_DOMAIN = "https://yourteam.cloudflareaccess.com"
# CF_ACCESS_AUD = "<access application AUD tag>"
# Inference provider seam (finding: easy model switch). 'anthropic' now (US, +APP-8 consent);
# flip a tenant's profiles.inference_provider to 'bedrock' for AU residency (ap-southeast-2).
# This var is only the default for tenants with no explicit provider set.
DEFAULT_INFERENCE_PROVIDER = "anthropic"
DEFAULT_INFERENCE_REGION = "ap-southeast-2"
# QuickBooks base URL: start on sandbox; flip to production when ready.
QBO_BASE_URL = "https://quickbooks.api.intuit.com"
# prod: https://quickbooks.api.intuit.com
# NOTE: locationHint:"oc" in code is a LATENCY hint only — it does NOT guarantee AU data
# residency (review finding B5). Genuine AU residency comes from Bedrock ap-southeast-2.

# --- Secrets (set via `wrangler secret put <name>`; never commit) ---
# ANTHROPIC_API_KEY        Claude reasoning + vision OCR (US path)
# QBO_CLIENT_ID            Intuit Developer app — Keys & Credentials
# QBO_CLIENT_SECRET        Intuit Developer app — Keys & Credentials
# AWS_ACCESS_KEY_ID        (only when inference_provider=bedrock)
# AWS_SECRET_ACCESS_KEY    (only when inference_provider=bedrock)
# NOTE: QBO refresh/access tokens are NOT secrets — they rotate on every use and are
#       persisted per-tenant in D1 (qbo_connections), seeded by the OAuth connect flow (Stage 5).
