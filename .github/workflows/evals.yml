name: Categorisation evals

# Quality gate: any change to the rule pack, the categorisation prompt, or the eval
# set must not regress categorisation accuracy below the recorded baseline.
on:
  pull_request:
    paths:
      - "evals/**"
      - "src/rulepacks/**"
      - "src/agent.ts"
      - "src/extract.ts"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run promptfoo eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Absolute floor in addition to the baseline-regression check below.
          PROMPTFOO_PASS_RATE_THRESHOLD: "70"
        run: npm run eval
      - name: Regression gate vs baseline
        run: npm run eval:gate
