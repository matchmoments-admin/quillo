# Stage 6 — tax-agent categorisation eval. Run: npm run eval (needs ANTHROPIC_API_KEY).
description: "Tax-agent categorisation (fields -> bucket + ATO label)"

prompts:
  - file://prompts/categorise.cjs

providers:
  # Same model the Worker categorises with (src/extract.ts).
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config:
      max_tokens: 512
      temperature: 0

# Cases generated from the committed fixtures in evals/cases/.
tests: file://load_cases.cjs

defaultTest:
  options:
    # Newer Haiku wraps its JSON in ```json fences despite the prompt asking it not to.
    # Extract the first {...} object so is-json + JSON.parse(output) assertions see clean
    # JSON regardless of fences or stray prose. Runs before per-assertion transforms.
    transform: "output.match(/\\{[\\s\\S]*\\}/) ? output.match(/\\{[\\s\\S]*\\}/)[0] : output"
    # LLM-as-judge grader for model-graded assertions (llm-rubric). A different tier
    # than the model under test — see evals/README.md for the same-family caveat.
    # NB: Opus 4.8 rejects the `temperature` param promptfoo's provider always sends
    # ("temperature is deprecated for this model"), so the grader is Sonnet 4.6 — still
    # a stronger/different tier than the Haiku 4.5 target, and accepts temperature.
    provider: anthropic:messages:claude-sonnet-4-6
